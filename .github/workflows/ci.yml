name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Test the packed package
        run: npm test

      - name: Build the CLI
        run: npm run build

      - name: Dogfood the recommended TypeScript policy
        run: node dist/cli.js src text typescript --ignore-tests
